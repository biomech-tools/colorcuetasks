<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ColorCue Tasks</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
  }

  /* LANG SWITCHER (shared) */
  .lang-switcher { display: flex; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.10); border: 1.5px solid #dde1e7; background: #fff; }
  .lang-btn { padding: 0 10px; height: 36px; border: none; background: transparent; font-size: 12px; font-weight: 700; color: #aaa; cursor: pointer; transition: background 0.15s, color 0.15s; letter-spacing: 0.03em; }
  .lang-btn.active { background: #1a1a2e; color: #fff; }
  .lang-btn:first-child { border-right: 1.5px solid #dde1e7; }

  /* SETUP SCREEN */
  .setup-screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 24px; text-align: center;
  }
  .setup-screen.visible { display: flex; }
  .setup-top-bar { width: 100%; max-width: 340px; display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .setup-logo-title { font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
  .setup-logo-sub   { font-size: 13px; color: #8a9ab0; margin-bottom: 28px; }
  .setup-card {
    background: #fff; border-radius: 20px; padding: 28px 24px;
    width: 100%; max-width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  }
  .setup-icon { font-size: 42px; margin-bottom: 14px; }
  .setup-msg  { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; line-height: 1.5; }
  .setup-hint { font-size: 12px; color: #8a9ab0; margin-bottom: 22px; line-height: 1.6; }
  .setup-btn {
    width: 100%; padding: 16px; background: #1a1a2e; color: #fff;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 14px rgba(26,26,46,0.22);
    transition: opacity 0.15s, transform 0.1s;
  }
  .setup-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* LOGIN SCREEN */
  .login-screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px 20px;
  }
  .login-screen.visible { display: flex; }
  .login-top-bar { width: 100%; max-width: 360px; display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .login-card {
    background: #fff; border-radius: 20px;
    padding: 32px 24px; width: 100%; max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  }
  .login-logo { text-align: center; margin-bottom: 24px; }
  .login-logo-title { font-size: 22px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.02em; }
  .login-logo-sub   { font-size: 12px; color: #8a9ab0; margin-top: 3px; font-weight: 500; }
  .form-label {
    font-size: 12px; font-weight: 700; color: #555;
    margin-bottom: 6px; display: block;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .form-input {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid #dde1e7; border-radius: 10px;
    font-size: 28px; font-weight: 700; letter-spacing: 0.25em;
    text-align: center; outline: none;
    font-family: 'SF Mono','Consolas',monospace;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fff; color: #1a1a2e;
  }
  .form-input:focus { border-color: #1a1a2e; box-shadow: 0 0 0 3px rgba(26,26,46,0.08); }
  .form-hint { font-size: 11px; color: #aaa; margin-top: 6px; text-align: center; }
  .login-btn {
    width: 100%; padding: 14px; background: #1a1a2e; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 16px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .login-btn:active { opacity: 0.85; transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .login-error { color: #c62828; font-size: 13px; font-weight: 500; text-align: center; margin-top: 10px; min-height: 18px; }
  .saved-group-hint {
    display: flex; align-items: center; gap: 8px;
    background: #f0f7ff; border: 1.5px solid #c8e0f8;
    border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
    font-size: 13px; color: #1a56a0; font-weight: 500;
  }
  .saved-group-code {
    font-family: 'SF Mono','Consolas',monospace;
    font-size: 16px; font-weight: 800; letter-spacing: 0.12em;
    background: #1a56a0; color: #fff; border-radius: 6px; padding: 2px 10px;
  }
  .clear-saved { margin-left: auto; background: none; border: none; color: #8a9ab0; font-size: 18px; cursor: pointer; }
  .login-admin-link { text-align: center; margin-top: 18px; font-size: 13px; color: #8a9ab0; }
  .login-admin-link button { background: none; border: none; color: #1a56a0; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: underline; }

  /* MAIN APP */
  .app-screen { display: none; padding: 16px 14px 28px; }
  .app-screen.visible { display: block; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .header-left { display: flex; flex-direction: column; gap: 3px; }
  .header h1 { font-size: 18px; font-weight: 800; color: #1a1a2e; }
  .header-group-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: #8a9ab0; letter-spacing: 0.04em; }
  .header-group-badge span { font-family: 'SF Mono','Consolas',monospace; font-size: 12px; font-weight: 800; background: #1a56a0; color: #fff; border-radius: 5px; padding: 1px 7px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .reload-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.12); font-size: 20px; cursor: pointer; transition: transform 0.25s; }
  .reload-btn:active { transform: rotate(180deg); }

  #tileContainer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .tile { position: relative; border-radius: 12px; padding: 12px 8px 10px; min-height: 72px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 15px; font-weight: 600; cursor: pointer; word-break: break-all; overflow-wrap: break-word; line-height: 1.35; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.12s; -webkit-tap-highlight-color: transparent; }
  .tile:active { transform: scale(0.94); }
  .tile-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.2); color: #fff; font-size: 10px; font-weight: 700; border-radius: 9px; padding: 1px 5px; min-width: 17px; text-align: center; }
  .c-gray   { background: #dde1e7; color: #444; }
  .c-blue   { background: #c8e6ff; color: #1255a0; }
  .c-yellow { background: #ffe600; color: #5a4000; }
  .c-orange { background: #ff6a00; color: #fff; }
  .c-red    { background: #ff4444; color: #fff; }
  @keyframes slowBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes fastBlink { 0%,100%{opacity:1} 50%{opacity:0.08} }
  .blink-slow { animation: slowBlink 1s ease-in-out infinite; }
  .blink-fast { animation: fastBlink 0.32s ease-in-out infinite; }

  .bottom-bar { display: flex; flex-direction: column; gap: 10px; }
  .manage-btn { width: 100%; padding: 16px; background: #1a1a2e; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(26,26,46,0.22); -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
  .manage-btn:active { opacity: 0.8; }
  .logout-btn { width: 100%; padding: 12px; background: #fff; color: #888; border: 1.5px solid #dde1e7; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .logout-btn:active { background: #f0f2f5; }
  .app-label-block { text-align: center; margin-top: 12px; }
  .app-label { font-size: 0.95rem; font-weight: 700; color: #1a56a0; }
  .app-version { font-weight: 400; color: #8a9ab0; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.52); display: none; z-index: 100; overflow-y: auto; padding: 20px 14px 30px; }
  .modal-bg.open { display: block; }
  .modal { background: #fff; max-width: 480px; margin: 30px auto 0; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .modal-header { padding: 16px 18px; background: #1a1a2e; color: #fff; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 17px; font-weight: 700; }
  .modal-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: #fff; font-size: 18px; cursor: pointer; line-height: 1; }
  .modal-body { padding: 14px; }
  .task-card { border: 1.5px solid #e8eaed; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; background: #fafafa; }
  .task-card.submitted { background: #f1faf2; border-color: #a5d6a7; }
  .task-card.overdue   { background: #fff5f5; border-color: #ff6b6b; }
  .task-content { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 5px; }
  .task-deadline { font-size: 13px; color: #777; margin-bottom: 10px; }
  .task-deadline.is-overdue { color: #c62828; font-weight: 700; }
  .task-deadline.is-soon    { color: #e65100; font-weight: 600; }
  .submit-label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: #333; cursor: pointer; }
  .submit-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: #2e7d32; cursor: pointer; }
  .no-tasks { text-align: center; padding: 24px; color: #aaa; font-size: 14px; }
  .empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; line-height: 1.8; grid-column: 1/-1; }

  /* LOADING */
  .loading-overlay { position: fixed; inset: 0; background: rgba(240,242,245,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 200; }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 36px; height: 36px; border: 3px solid #dde1e7; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; font-weight: 500; color: #888; }

  /* TOAST */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a2e; color: #fff; padding: 11px 22px; border-radius: 24px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; z-index: 500; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">読み込み中...</div>
</div>

<!-- Setup Screen (初回・未設定) -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-top-bar">
    <div class="lang-switcher">
      <button class="lang-btn" id="setup-btn-jp" onclick="setLang('ja')">JP</button>
      <button class="lang-btn" id="setup-btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="setup-logo-title">ColorCue Tasks</div>
  <div class="setup-logo-sub">V1.0 Beta</div>
  <div class="setup-card">
    <div class="setup-icon">&#9881;&#65039;</div>
    <div class="setup-msg" id="setupMsg"></div>
    <div class="setup-hint" id="setupHint"></div>
    <button class="setup-btn" id="setupBtn" onclick="goAdmin()"></button>
  </div>
</div>

<!-- Login Screen (コード入力) -->
<div class="login-screen" id="loginScreen">
  <div class="login-top-bar">
    <div class="lang-switcher">
      <button class="lang-btn" id="login-btn-jp" onclick="setLang('ja')">JP</button>
      <button class="lang-btn" id="login-btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-title">ColorCue Tasks</div>
      <div class="login-logo-sub">V1.0 Beta</div>
    </div>
    <div id="savedGroupHint" style="display:none" class="saved-group-hint">
      <span id="savedGroupLabel"></span>
      <span class="saved-group-code" id="savedGroupCode"></span>
      <button class="clear-saved" onclick="clearSavedGroup()" title="クリア">&#10005;</button>
    </div>
    <label class="form-label" for="codeInput" id="codeLabel"></label>
    <input class="form-input" id="codeInput" type="tel" maxlength="5" placeholder="00000"
           autocomplete="off" oninput="onCodeInput(this)" onkeydown="if(event.key==='Enter')loginWithCode()">
    <div class="form-hint" id="codeHint"></div>
    <button class="login-btn" id="codeLoginBtn" onclick="loginWithCode()" disabled></button>
    <div class="login-error" id="codeError"></div>
    <div class="login-admin-link">
      <button onclick="goAdmin()" id="adminLinkBtn"></button>
    </div>
  </div>
</div>

<!-- Main App -->
<div class="app-screen" id="appScreen">
  <div class="header">
    <div class="header-left">
      <h1 id="tileTitle"></h1>
      <div class="header-group-badge">GROUP <span id="headerGroupCode"></span></div>
    </div>
    <div class="header-right">
      <div class="lang-switcher">
        <button class="lang-btn" id="app-btn-jp" onclick="setLang('ja')">JP</button>
        <button class="lang-btn" id="app-btn-en" onclick="setLang('en')">EN</button>
      </div>
      <button class="reload-btn" onclick="reloadData()" title="reload">&#8635;</button>
    </div>
  </div>
  <div id="tileContainer"></div>
  <div class="bottom-bar">
    <button class="manage-btn" id="manageBtnMain" onclick="goAdmin()"></button>
    <button class="logout-btn" id="logoutBtn" onclick="logout()"></button>
  </div>
  <div class="app-label-block">
    <span class="app-label">ColorCue Tasks <span class="app-version">V1.0 Beta</span></span>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, doc, getDoc, getDocs, collection, setDoc
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBB2SdUfNU1K-yeEgm_dOynrH76rqwT2VQ",
  authDomain: "colorcue-tasks.firebaseapp.com",
  projectId: "colorcue-tasks",
  storageBucket: "colorcue-tasks.firebasestorage.app",
  messagingSenderId: "412238648786",
  appId: "1:412238648786:web:34ebfee504679b3ff9240b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const LANG_KEY    = 'cct_lang_v1';
const SAVED_GROUP = 'cct_group_v1';

const STRINGS = {
  ja: {
    loading:        '読み込み中...',
    setupMsg:       'まだグループが作成されていません',
    setupHint:      '管理画面でグループを作成するとグループコードが発行されます。',
    setupBtn:       '管理画面を開く',
    defaultTitle:   '科目/仕事一覧',
    manageBtn:      '管理画面',
    logoutBtn:      'ログアウト',
    deadlineLabel:  '期限：',
    overdue:        '　⚠ 期限切れ',
    completedCheck: '完了した',
    noTasks:        '課題/業務なし',
    emptyMsg:       '管理画面から科目/仕事と課題/業務を設定してください',
    codeLabel:      'グループコード',
    codeHint:       '5桁の数字を入力してください',
    codeLoginBtn:   '入室する',
    codeError:      'グループコードが見つかりません',
    savedGroup:     '前回のグループ',
    adminLink:      '管理画面はこちら',
  },
  en: {
    loading:        'Loading...',
    setupMsg:       'No groups have been created yet',
    setupHint:      'Open the admin panel to create a group and get a group code.',
    setupBtn:       'Open Admin Panel',
    defaultTitle:   'List of Subjects/Works',
    manageBtn:      'Admin Panel',
    logoutBtn:      'Log out',
    deadlineLabel:  'Deadline: ',
    overdue:        '　⚠ Overdue',
    completedCheck: 'Completed',
    noTasks:        'No assignments/tasks',
    emptyMsg:       'Please set up subjects/works in the admin panel.',
    codeLabel:      'Group Code',
    codeHint:       'Enter 5-digit group code',
    codeLoginBtn:   'Enter',
    codeError:      'Group code not found',
    savedGroup:     'Last group',
    adminLink:      'Go to Admin Panel',
  }
};

let currentLang = localStorage.getItem(LANG_KEY) || 'ja';
let groupCode   = null;
let appData     = { tile_title: '', subjects: [], tasks: [] };
let submitData  = {};

function t(key) { return STRINGS[currentLang][key] || key; }
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || t('loading');
  document.getElementById('loadingOverlay').classList.remove('hidden');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// すべての画面のlangボタンを一括で更新
function applyLangButtons() {
  const isJa = currentLang === 'ja';
  ['setup-btn-jp','login-btn-jp','app-btn-jp'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', isJa);
  });
  ['setup-btn-en','login-btn-en','app-btn-en'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', !isJa);
  });
}

window.setLang = function(lang) {
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);
  applyLangUI();
  renderTiles();
};

function applyLangUI() {
  applyLangButtons();
  document.getElementById('manageBtnMain').textContent   = t('manageBtn');
  document.getElementById('logoutBtn').textContent       = t('logoutBtn');
  document.getElementById('setupMsg').textContent        = t('setupMsg');
  document.getElementById('setupHint').textContent       = t('setupHint');
  document.getElementById('setupBtn').textContent        = t('setupBtn');
  document.getElementById('codeLabel').textContent       = t('codeLabel');
  document.getElementById('codeHint').textContent        = t('codeHint');
  document.getElementById('codeLoginBtn').textContent    = t('codeLoginBtn');
  document.getElementById('savedGroupLabel').textContent = t('savedGroup');
  document.getElementById('adminLinkBtn').textContent    = t('adminLink');
}

window.goAdmin = function() { location.href = 'admin.html'; };

window.onCodeInput = function(el) {
  el.value = el.value.replace(/\D/g,'').slice(0,5);
  document.getElementById('codeLoginBtn').disabled = el.value.length !== 5;
  document.getElementById('codeError').textContent = '';
};

window.clearSavedGroup = function() {
  localStorage.removeItem(SAVED_GROUP);
  document.getElementById('savedGroupHint').style.display = 'none';
  document.getElementById('codeInput').value = '';
  document.getElementById('codeLoginBtn').disabled = true;
};

window.loginWithCode = async function() {
  const code = document.getElementById('codeInput').value.trim();
  if (code.length !== 5) return;
  document.getElementById('codeLoginBtn').disabled = true;
  showLoading();
  try {
    const snap = await getDoc(doc(db, 'groups', code));
    if (!snap.exists()) {
      document.getElementById('codeError').textContent = t('codeError');
      document.getElementById('codeLoginBtn').disabled = false;
      hideLoading();
      return;
    }
    localStorage.setItem(SAVED_GROUP, code);
    await enterGroup(code);
  } catch(e) {
    document.getElementById('codeError').textContent = e.message;
    document.getElementById('codeLoginBtn').disabled = false;
    hideLoading();
  }
};

async function enterGroup(code) {
  groupCode = code;
  showLoading();
  try {
    await loadGroupData(code);
    document.getElementById('loginScreen').classList.remove('visible');
    document.getElementById('setupScreen').classList.remove('visible');
    document.getElementById('appScreen').classList.add('visible');
    document.getElementById('headerGroupCode').textContent = code;
    applyLangUI();
    renderTiles();
    hideLoading();
  } catch(e) {
    showToast(e.message);
    groupCode = null;
    hideLoading();
  }
}

async function loadGroupData(code) {
  const [configSnap, subjectsSnap, tasksSnap, submitSnap] = await Promise.all([
    getDoc(doc(db, 'groups', code, 'config', 'main')),
    getDocs(collection(db, 'groups', code, 'subjects')),
    getDocs(collection(db, 'groups', code, 'tasks')),
    getDoc(doc(db, 'groups', code, 'submits', 'main')),
  ]);
  appData.tile_title = configSnap.exists() ? (configSnap.data().tile_title || '') : '';
  appData.subjects   = subjectsSnap.docs
    .map(d => ({ id: d.data().id, name: d.data().name, order: d.data().order ?? d.data().id }))
    .sort((a, b) => a.order - b.order);
  appData.tasks      = tasksSnap.docs.map(d => ({
    id: d.id, subject_id: d.data().subject_id,
    content: d.data().content, deadline: d.data().deadline,
  }));
  submitData = submitSnap.exists() ? (submitSnap.data() || {}) : {};
}

window.reloadData = async function() {
  if (!groupCode) return;
  showLoading();
  try { await loadGroupData(groupCode); renderTiles(); } catch(e) { showToast(e.message); }
  hideLoading();
};

window.logout = function() {
  groupCode  = null;
  appData    = { tile_title: '', subjects: [], tasks: [] };
  submitData = {};
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('codeError').textContent = '';
  const saved = localStorage.getItem(SAVED_GROUP);
  if (saved) {
    document.getElementById('savedGroupHint').style.display = 'flex';
    document.getElementById('savedGroupCode').textContent   = saved;
    document.getElementById('codeInput').value              = saved;
    document.getElementById('codeLoginBtn').disabled        = false;
  } else {
    document.getElementById('codeInput').value = '';
    document.getElementById('codeLoginBtn').disabled = true;
  }
  document.getElementById('loginScreen').classList.add('visible');
};

// RENDER
const OLD_PATTERNS = [/^科目\d+$/, /^Subject #\d+$/, /^Subject\/Work #\d+$/, /^科目\/仕事\d+$/];
function resolveSubjectName(subj) {
  const isOld = OLD_PATTERNS.some(re => re.test(subj.name));
  return (subj.name && !isOld) ? subj.name
    : (currentLang === 'ja' ? `科目/仕事${subj.id}` : `Subject / Work #${subj.id}`);
}
function tasksOf(sid) { return appData.tasks.filter(t => t.subject_id === sid); }
function getTileState(sid) {
  const tasks = tasksOf(sid);
  const key   = 's' + sid;
  if (!submitData[key]) submitData[key] = {};
  const unsub = tasks.filter(t => !submitData[key][t.id]);
  if (!unsub.length) return { color: 'gray', blink: null };
  const now  = new Date();
  const over = unsub.filter(t => new Date(t.deadline) < now);
  if (over.length >= 2) return { color: 'red',    blink: 'fast' };
  if (over.length === 1) return { color: 'red',   blink: 'slow' };
  const near = unsub.reduce((a, b) => new Date(a.deadline) < new Date(b.deadline) ? a : b);
  const dh   = (new Date(near.deadline) - now) / 3600000;
  if (dh <= 24) return { color: 'red',    blink: null };
  if (dh <= 48) return { color: 'orange', blink: null };
  if (dh <= 72) return { color: 'yellow', blink: null };
  return { color: 'blue', blink: null };
}
function renderTiles() {
  const oldDefaults = ['課題一覧','課題/業務一覧','List of Assignments/Works'];
  const title = (appData.tile_title && !oldDefaults.includes(appData.tile_title))
    ? appData.tile_title : t('defaultTitle');
  document.getElementById('tileTitle').textContent = title;
  const box = document.getElementById('tileContainer');
  box.innerHTML = '';
  if (!appData.subjects.length) {
    box.innerHTML = `<div class="empty-state">${escHtml(t('emptyMsg'))}</div>`;
    return;
  }
  appData.subjects.forEach(subj => {
    const st  = getTileState(subj.id);
    const el  = document.createElement('div');
    el.className = 'tile c-' + st.color + (st.blink ? ' blink-' + st.blink : '');
    const key = 's' + subj.id;
    if (!submitData[key]) submitData[key] = {};
    const cnt = tasksOf(subj.id).filter(task => !submitData[key][task.id]).length;
    el.innerHTML = escHtml(resolveSubjectName(subj)) + (cnt > 0 ? `<span class="tile-badge">${cnt}</span>` : '');
    el.onclick = () => openModal(subj);
    box.appendChild(el);
  });
}
function fmtDate(dt) {
  const d = new Date(dt);
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function openModal(subj) {
  document.getElementById('modalTitle').textContent = resolveSubjectName(subj);
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  const key   = 's' + subj.id;
  if (!submitData[key]) submitData[key] = {};
  const tasks = tasksOf(subj.id);
  if (!tasks.length) {
    body.innerHTML = `<div class="no-tasks">${t('noTasks')}</div>`;
  } else {
    const now = new Date();
    tasks.forEach(task => {
      const done = !!submitData[key][task.id];
      const over = new Date(task.deadline) < now;
      const dh   = (new Date(task.deadline) - now) / 3600000;
      const card = document.createElement('div');
      card.className = 'task-card' + (done ? ' submitted' : (over ? ' overdue' : ''));
      const dlClass = 'task-deadline' + (!done && over ? ' is-overdue' : (!done && dh <= 24 ? ' is-soon' : ''));
      card.innerHTML =
        `<div class="task-content">${escHtml(task.content)}</div>` +
        `<div class="${dlClass}">${t('deadlineLabel')}${escHtml(fmtDate(task.deadline))}${!done && over ? t('overdue') : ''}</div>` +
        `<label class="submit-label"><input type="checkbox" ${done ? 'checked' : ''}>${escHtml(t('completedCheck'))}</label>`;
      card.querySelector('input').addEventListener('change', function() {
        toggleSubmit(subj.id, task.id, this);
      });
      body.appendChild(card);
    });
  }
  document.getElementById('modalBg').classList.add('open');
}
window.closeModal = function() { document.getElementById('modalBg').classList.remove('open'); };
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

async function toggleSubmit(subjId, taskId, cb) {
  const key = 's' + subjId;
  if (!submitData[key]) submitData[key] = {};
  submitData[key][taskId] = cb.checked;
  const task = appData.tasks.find(x => x.id === taskId);
  const now  = new Date();
  const over = task && new Date(task.deadline) < now;
  const card = cb.closest('.task-card');
  card.className = 'task-card' + (cb.checked ? ' submitted' : (over ? ' overdue' : ''));
  renderTiles();
  try {
    await setDoc(doc(db, 'groups', groupCode, 'submits', 'main'), submitData);
  } catch(e) { showToast(e.message); }
}

// INIT
async function init() {
  showLoading();
  applyLangUI();

  let hasGroups = false;
  try {
    const groupsSnap = await getDocs(collection(db, 'groups'));
    hasGroups = !groupsSnap.empty;
  } catch(_) {}

  if (!hasGroups) {
    hideLoading();
    document.getElementById('setupScreen').classList.add('visible');
    return;
  }

  const savedCode = localStorage.getItem(SAVED_GROUP);
  if (savedCode) {
    try {
      const snap = await getDoc(doc(db, 'groups', savedCode));
      if (snap.exists()) {
        await enterGroup(savedCode);
        return;
      }
    } catch(_) {}
    localStorage.removeItem(SAVED_GROUP);
  }

  hideLoading();
  const saved = localStorage.getItem(SAVED_GROUP);
  if (saved) {
    document.getElementById('savedGroupHint').style.display = 'flex';
    document.getElementById('savedGroupCode').textContent   = saved;
    document.getElementById('codeInput').value              = saved;
    document.getElementById('codeLoginBtn').disabled        = false;
  }
  document.getElementById('loginScreen').classList.add('visible');
}

init();
</script>
